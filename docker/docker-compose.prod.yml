# ─────────────────────────────────────────────────────────────────────────────
# LedgerMind — docker-compose.prod.yml
# Différences vs dev :
#   - TLS Let's Encrypt (Traefik traefik.prod.yml)
#   - Dashboard Traefik désactivé
#   - Pas de volumes hot-reload (pas de ../backend:/app)
#   - Rate limiting sur /api/ et /api/token/
#   - postgres ports: toujours fermés
#   - Profiles mcp activés par défaut
#   - Images depuis registry (pas de build local)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  proxy:
    driver: bridge
    name: ledgermind_proxy
  backend:
    driver: bridge
    name: ledgermind_backend
    internal: true
  ai:
    driver: bridge
    name: ledgermind_ai
    internal: true

volumes:
  postgres-data:
  minio-data:
  ollama-data:
  traefik-certs:

services:

  traefik:
    image: traefik:v3.3
    container_name: lm_traefik
    networks: [proxy]
    ports:
      - "80:80"
      - "443:443"
      # Pas de 8080 — dashboard désactivé en prod
    volumes:
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    restart: always

  django:
    image: ${DOCKER_REGISTRY}/backend:${IMAGE_TAG:-latest}
    container_name: lm_django
    networks: [proxy, backend]
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD}@postgres:5432/ledgermind
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${DOMAIN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ledgermind_proxy"
      - "traefik.http.routers.django.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.django.entrypoints=websecure"
      - "traefik.http.routers.django.tls.certresolver=letsencrypt"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
      # Rate limiting — /api/token/ (login)
      - "traefik.http.routers.django-auth.rule=Host(`api.${DOMAIN}`) && PathPrefix(`/api/token`)"
      - "traefik.http.routers.django-auth.middlewares=auth-ratelimit@docker"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.burst=5"
      # Admin — IP allowlist stricte
      - "traefik.http.routers.django-admin.rule=Host(`api.${DOMAIN}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.django-admin.entrypoints=websecure"
      - "traefik.http.routers.django-admin.middlewares=admin-ipwl@docker"
      - "traefik.http.middlewares.admin-ipwl.ipallowlist.sourcerange=${ADMIN_IP_ALLOWLIST}"
    restart: always

  celery:
    image: ${DOCKER_REGISTRY}/backend:${IMAGE_TAG:-latest}
    container_name: lm_celery
    command: celery -A config worker -l warning -Q default,pdf,llm -c 4
    networks: [backend, ai]
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD}@postgres:5432/ledgermind
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      MCP_LEDGER_URL: http://mcp-ledger:3000
      MCP_DOCUMENTS_URL: http://mcp-documents:3001
    depends_on:
      - django
      - redis
      - ollama
    restart: always

  celery-beat:
    image: ${DOCKER_REGISTRY}/backend:${IMAGE_TAG:-latest}
    container_name: lm_celery_beat
    command: celery -A config beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks: [backend]
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD}@postgres:5432/ledgermind
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - django
      - redis
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: lm_postgres
    networks: [backend]
    # ports: JAMAIS exposés en prod
    environment:
      POSTGRES_DB: ledgermind
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledgermind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: lm_redis
    networks: [backend, ai]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    restart: always

  minio:
    image: minio/minio:latest
    container_name: lm_minio
    networks: [backend]  # Pas sur proxy en prod — accès S3 via backend uniquement
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: lm_ollama
    networks: [ai]
    environment:
      OLLAMA_HOST: "0.0.0.0"
    volumes:
      - ollama-data:/root/.ollama
    restart: always

  mcp-ledger:
    image: ${DOCKER_REGISTRY}/mcp-ledger:${IMAGE_TAG:-latest}
    container_name: lm_mcp_ledger
    networks: [backend, ai]
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD}@postgres:5432/ledgermind
      MCP_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  mcp-documents:
    image: ${DOCKER_REGISTRY}/mcp-documents:${IMAGE_TAG:-latest}
    container_name: lm_mcp_documents
    networks: [backend, ai]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MCP_PORT: "3001"
    depends_on:
      - minio
    restart: always

  mcp-pdf:
    image: ${DOCKER_REGISTRY}/mcp-pdf:${IMAGE_TAG:-latest}
    container_name: lm_mcp_pdf
    networks: [backend, ai]
    environment:
      MCP_PORT: "3002"
    restart: always

  mcp-compliance:
    image: ${DOCKER_REGISTRY}/mcp-compliance:${IMAGE_TAG:-latest}
    container_name: lm_mcp_compliance
    networks: [backend, ai]
    environment:
      DATABASE_URL: postgres://ledger:${POSTGRES_PASSWORD}@postgres:5432/ledgermind
      MCP_PORT: "3003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
